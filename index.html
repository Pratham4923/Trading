<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Titan | Professional Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="toast">✅ TRADE RECORDED</div>

    <nav class="sidebar">
        <div class="nav-btn active">📊</div>
        <div class="nav-btn">⚙️</div>
    </nav>

    <main class="main">
        <div class="section-container">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <span class="card-label">Equity Curve</span>
                        <div id="disp-bal" style="font-size:45px; font-weight:900;">$100,000.00</div>
                    </div>
                    <div style="text-align: right">
                        <span class="card-label">Total Net</span>
                        <div id="disp-net" style="font-size:20px; font-weight:700;">+ $0.00</div>
                    </div>
                </div>
                <div style="height: 350px; margin-top:20px"><canvas id="ch-growth"></canvas></div>
            </div>

            <div class="stat-grid">
                <div class="card">
                    <span class="card-label">Monthly Heatmap</span>
                    <div class="calendar-grid" id="calendar-body"></div>
                </div>
                <div class="card">
                    <span class="card-label">Strategy Performance</span>
                    <div style="height: 250px;"><canvas id="ch-strat"></canvas></div>
                </div>
            </div>

            <div class="card">
                <span class="card-label">Execution Log</span>
                <table id="trade-table">
                    <thead><tr style="text-align:left; color:var(--muted); font-size:11px"><th>PAIR</th><th>ACTION</th><th>STRATEGY</th><th>P/L</th><th>DATE</th><th></th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <button class="fab" id="fabBtn" onclick="openModal()">+</button>

    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target==this) closeModal()">
        <div class="modal">
            <h2 style="margin:0 0 30px 0; font-weight:900;">Log Execution</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
                <div><label>Pair</label><input type="text" id="in-sym" placeholder="NAS100"></div>
                <div><label>Side</label><select id="in-type"><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div>
            </div>
            <label>Strategy (Type or Select)</label>
            <input list="strategy-options" id="in-strat" placeholder="SMC, Price Action...">
            <datalist id="strategy-options">
                <option value="SMC / ICT">
                <option value="Price Action">
                <option value="Mean Reversion">
                <option value="Breakout">
                <option value="Trend Following">
            </datalist>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
                <div><label>Lots</label><input type="number" id="in-lot" value="1.00"></div>
                <div><label>P/L ($)</label><input type="number" id="in-pro" placeholder="0.00"></div>
            </div>
            <button class="btn-action" id="commitBtn" onclick="confirmEntry()">SAVE TRADE</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
